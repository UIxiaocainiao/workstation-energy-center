version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: workstation-energy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: workstation_energy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - workstation-energy-db:/var/lib/postgresql/data

volumes:
  workstation-energy-db:
